version: '3.8'
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
